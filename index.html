<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>시우의 개인 서버.1</title>
    <style>
        /* 기본 스타일 */
        body {
            font-family: 'Malgun Gothic', '맑은 고딕', sans-serif;
            background-color: #f4f7f6;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px; /* 오답 노트 공간 확보 */
        }
        .container {
            background-color: #ffffff;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
            width: 90%;
            max-width: 700px; /* 오답 노트 공간 확보 */
            text-align: center;
        }
        h1 {
            color: #2c3e50;
            border-bottom: 3px solid #f39c12; 
            padding-bottom: 10px;
            margin-bottom: 20px;
        }
        .quiz-status {
            font-size: 1.1em;
            color: #7f8c8d;
            margin-bottom: 20px;
        }
        .word-display {
            font-size: 2.5em;
            font-weight: bold;
            color: #34495e;
            margin: 30px 0;
            min-height: 50px;
        }
        input[type="text"] {
            padding: 12px;
            width: 80%;
            max-width: 300px;
            margin-bottom: 15px;
            border: 2px solid #bdc3c7;
            border-radius: 8px;
            font-size: 1.1em;
            transition: border-color 0.3s;
        }
        input[type="text"]:focus {
            border-color: #f39c12;
            outline: none;
        }
        button {
            padding: 12px 25px;
            font-size: 1.1em;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: background-color 0.3s;
        }
        #submit-btn {
            background-color: #f39c12;
            color: white;
            margin-right: 10px;
        }
        #submit-btn:hover {
            background-color: #e67e22;
        }
        #next-btn {
            background-color: #2ecc71;
            color: white;
            display: none;
        }
        #next-btn:hover {
            background-color: #27ae60;
        }
        .feedback {
            margin-top: 15px;
            font-size: 1.1em;
            font-weight: bold;
            min-height: 25px;
        }
        .correct {
            color: #2ecc71;
        }
        .wrong {
            color: #e74c3c;
        }
        /* 결과 화면 및 오답 노트 스타일 */
        .result-screen h2 {
            color: #2c3e50;
            margin-bottom: 15px;
        }
        .result-screen p {
            font-size: 1.5em;
            font-weight: bold;
            color: #f39c12;
        }
        .hidden {
            display: none;
        }

        #wrong-answers {
            margin-top: 40px;
            text-align: left;
            border-top: 2px solid #ecf0f1;
            padding-top: 20px;
        }
        #wrong-answers h3 {
            color: #e74c3c;
            font-size: 1.3em;
            margin-bottom: 15px;
        }
        #wrong-answers ul {
            list-style: none;
            padding: 0;
        }
        #wrong-answers li {
            background-color: #fde7e5;
            padding: 10px;
            margin-bottom: 8px;
            border-radius: 5px;
            font-size: 1em;
        }
        #wrong-answers li strong {
            color: #c0392b; /* 오답 강조 */
        }
        #wrong-answers li span {
            font-weight: bold;
            color: #3498db; /* 정답 강조 */
        }
    </style>
</head>
<body>
    <div class="container">
        <div id="quiz-screen">
            <h1> 중학 단어 학습 모드</h1>
            <p class="quiz-status" id="quiz-status">단어 로딩 중...</p>
            <div class="word-display" id="word-display"></div>
            
            <input type="text" id="answer-input" placeholder="여기에 뜻을 입력해주세요.">
            <div class="action-buttons">
                <button id="submit-btn">정답 확인</button>
                <button id="next-btn">다음 단어 →</button>
            </div>
            
            <div class="feedback" id="feedback-message"></div>
        </div>

        <div id="result-screen" class="hidden">
            <h2>모의 테스트가 종료되었습니다.</h2>
            <p id="final-score"></p>
            <button onclick="location.reload()">다시 시작</button>
            
            <div id="wrong-answers">
                </div>
        </div>
    </div>

    <script>
        const wordList = [
{english: "conflict", korean: "투쟁, 싸움"}, //
{english: "direction", korean: "방향, 지시"}, //
{english: "direct", korean: "직접적인, 지시하다"}, //
{english: "greenhouse", korean: "온실"}, //
{english: "site", korean: "위치, 장소"}, //
{english: "treasure", korean: "보물"}, //
{english: "request", korean: "요청, 요구"}, //
{english: "require", korean: "요구하다, 필요로 하다"}, //
{english: "translate", korean: "~을 번역하다"}, //
{english: "destruction", korean: "파괴"}, //
{english: "destroy", korean: "파괴하다"}, //
{english: "democracy", korean: "민주주의"}, //
{english: "upper", korean: "위쪽의"}, //
{english: "offer", korean: "제공하다, 제안하다"}, //
{english: "underneath", korean: "아래에, 밑에"}, //
{english: "underwater", korean: "물속의, 물속에서"}, //
{english: "civil", korean: "시민, 문명의"}, //
{english: "lunar", korean: "달의, 음력의"}, //
{english: "lack", korean: "부족, 결핍, 모자라다"}, //
{english: "lump", korean: "덩어리, 한조각"}, //
{english: "frontier", korean: "국경, 국경지방"}, //
{english: "swallow", korean: "삼키다, 제비"}, //
{english: "melt", korean: "녹다, 용해하다"}, //
{english: "freezing", korean: "몹시 추운"}, //
{english: "acid", korean: "신, 신맛의"}, //
{english: "false", korean: "그릇된"}, //
{english: "gap", korean: "틈, 간격"}, //
{english: "cart", korean: "손수레"}, //
{english: "instance", korean: "예, 사실"}, //
{english: "carpenter", korean: "목수, 목공"}, //
{english: "fat", korean: "살찐, 지방"}, //
{english: "attract", korean: "끌다, 매혹하다"}, //
{english: "completion", korean: "완성, 성취"}, //
{english: "relay", korean: "교대자, 전달하다"}, //
{english: "relate", korean: "관련시키다"}, //
{english: "consist", korean: "구성되다"}, //
{english: "defense", korean: "방어, 수비"}, //
{english: "offend", korean: "화나게 하다"}, //
{english: "ancestor", korean: "선조, 조상"}, //
{english: "rid", korean: "제거하다 (r)"}, //
{english: "get rid of", korean: "~을 없애다"}, //
            ];
        let shuffledWords = [];
        let currentWordIndex = 0;
        let score = 0;
        const totalWords = wordList.length;
        //  오답을 기록할 배열 추가
        let wrongAnswers = []; 

        const wordDisplay = document.getElementById('word-display');
        const answerInput = document.getElementById('answer-input');
        const submitBtn = document.getElementById('submit-btn');
        const nextBtn = document.getElementById('next-btn');
        const feedbackMessage = document.getElementById('feedback-message');
        const quizStatus = document.getElementById('quiz-status');
        const quizScreen = document.getElementById('quiz-screen');
        const resultScreen = document.getElementById('result-screen');
        const finalScore = document.getElementById('final-score');
        const wrongAnswersDiv = document.getElementById('wrong-answers'); // 오답 노트 영역 DOM

        // 단어 목록 섞기 함수
        function shuffleArray(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
        }

        function startQuiz() {
            shuffledWords = [...wordList];
            shuffleArray(shuffledWords);
            currentWordIndex = 0;
            score = 0;
            wrongAnswers = []; // 시험 시작 시 오답 기록 초기화

            quizScreen.classList.remove('hidden');
            resultScreen.classList.add('hidden');
            nextWord();
        }

        function nextWord() {
            if (currentWordIndex >= totalWords) {
                showResults();
                return;
            }

            const currentWord = shuffledWords[currentWordIndex];
            
            quizStatus.textContent = `${currentWordIndex + 1}/${totalWords} 번째 단어`;
            wordDisplay.textContent = currentWord.english;
            answerInput.value = '';
            feedbackMessage.textContent = '';
            feedbackMessage.className = 'feedback';
            
            submitBtn.style.display = 'inline-block';
            nextBtn.style.display = 'none';
            answerInput.disabled = false;
            answerInput.focus();
        }

        function checkAnswer() {
            const currentWord = shuffledWords[currentWordIndex];
            const userAnswer = answerInput.value.trim(); 
            const cleanedUserAnswer = userAnswer.toLowerCase().replace(/\s/g, '').replace(/,/g, ''); // 채점용: 공백, 쉼표 제거

            // 정답 목록도 공백, 쉼표 제거
            const correctMeanings = currentWord.korean.split(',').map(m => m.trim().toLowerCase().replace(/\s/g, '').replace(/,/g, ''));

            if (correctMeanings.includes(cleanedUserAnswer)) {
                //  정답인 경우
                feedbackMessage.textContent = `**정답입니다.**`;
                feedbackMessage.classList.remove('wrong');
                feedbackMessage.classList.add('correct');
                score++;
                
            } else {
                //  오답인 경우: 오답을 기록하고 답을 알려줌
                feedbackMessage.textContent = `틀렸습니다. 정답은 '**${currentWord.korean}**' 입니다.`;
                feedbackMessage.classList.remove('correct');
                feedbackMessage.classList.add('wrong');
                
                //  오답 정보 기록 (사용자가 입력한 원본 형태 저장)
                wrongAnswers.push({
                    english: currentWord.english,
                    userAnswer: answerInput.value || "(입력 안함)", 
                    correctAnswer: currentWord.korean
                });
            }
            
            // 정답이든 오답이든 상관없이 다음으로 넘어갈 수 있게 버튼 변경
            submitBtn.style.display = 'none';
            nextBtn.style.display = 'inline-block';
            answerInput.disabled = true;
            nextBtn.focus();
        }

        //  오답 목록을 HTML에 표시하는 함수
        function displayWrongAnswers() {
            if (wrongAnswers.length === 0) {
                wrongAnswersDiv.innerHTML = '<h3 style="color:#2ecc71;"> 음 섹스 하응</h3>';
                return;
            }

            let html = '<h3>틀린 단어 목록 (오답 노트)</h3><ul>';
            
            wrongAnswers.forEach(item => {
                html += `
                    <li>
                        **${item.english}**<br>
                        네 답: <strong>${item.userAnswer}</strong><br>
                        정답: <span>${item.correctAnswer}</span>
                    </li>
                `;
            });

            html += '</ul>';
            wrongAnswersDiv.innerHTML = html;
        }


        function showResults() {
            quizScreen.classList.add('hidden');
            resultScreen.classList.remove('hidden');
            finalScore.textContent = `총 ${totalWords}개 중 ${score}개 정답! (${(score / totalWords * 100).toFixed(1)}점)`;
            
            //  결과 화면에 오답 노트 표시
            displayWrongAnswers(); 
        }

        // 이벤트 리스너 설정
        submitBtn.addEventListener('click', checkAnswer);
        nextBtn.addEventListener('click', () => {
            currentWordIndex++;
            nextWord();
        });
        
        // 엔터키 처리(ㅅㅂ 이제 되네 샹)
        answerInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                e.preventDefault(); 
                if (submitBtn.style.display === 'inline-block') {
                    submitBtn.click();
                } else if (nextBtn.style.display === 'inline-block') {
                    nextBtn.click();
                }
            }
        });

        // 시험 시작 코드
        startQuiz();
    </script>
</body>
</html>
